<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Terra Nova</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--forest:#1a3a2e;--forest-mid:#2d6a4f;--forest-lt:#52b788;--gold:#d4a853;--ivory:#f5f0e8;--ivory-dk:#ede6d8;--muted:#5a7365;--white:#fff;--red:#c0392b;--radius:10px}
    body{font-family:'DM Sans',sans-serif;background:var(--forest);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .box{background:var(--white);border-radius:16px;width:100%;max-width:420px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.3)}
    .box-header{background:linear-gradient(135deg,#0d2a1e,var(--forest));padding:32px;text-align:center}
    .box-header .icon{font-size:2.5rem;margin-bottom:12px}
    .box-header h1{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--ivory);margin-bottom:4px}
    .box-header p{font-size:0.78rem;color:rgba(245,240,232,0.5)}
    .box-body{padding:28px}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:0.76rem;font-weight:600;color:var(--forest);margin-bottom:5px}
    input{width:100%;padding:10px 13px;font-size:0.88rem;font-family:'DM Sans',sans-serif;color:var(--forest);background:var(--ivory);border:1.5px solid var(--ivory-dk);border-radius:var(--radius);outline:none;transition:border-color .2s}
    input:focus{border-color:var(--forest-mid);background:var(--white)}
    .btn{width:100%;padding:12px;background:var(--forest);color:var(--ivory);font-size:0.9rem;font-weight:600;font-family:'DM Sans',sans-serif;border:none;border-radius:var(--radius);cursor:pointer;margin-top:6px;transition:background .2s}
    .btn:hover{background:var(--forest-mid)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .banner{border-radius:var(--radius);padding:10px 14px;font-size:0.82rem;margin-bottom:14px;display:none;line-height:1.5}
    .banner.show{display:block}
    .banner.error{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);color:var(--red)}
    .banner.success{background:#f0fdf4;border:1px solid #86efac;color:#166534}
    .back-link{display:block;text-align:center;margin-top:16px;font-size:0.8rem;color:var(--muted);text-decoration:none}
    .back-link:hover{color:var(--forest)}
  </style>
</head>
<body>
  <div class="box">
    <div class="box-header">
      <div class="icon">🔑</div>
      <h1 id="pageTitle">Reset Password</h1>
      <p>Terra Nova — Set a new password</p>
    </div>
    <div class="box-body">
      <div class="banner error"   id="bannerError"></div>
      <div class="banner success" id="bannerSuccess"></div>

      <div id="formWrap">
        <div class="form-group">
          <label>New Password <span style="font-weight:400;color:var(--muted)">(min 8 characters)</span></label>
          <div style="position:relative;">
            <input type="password" id="newPassword" placeholder="••••••••" autocomplete="new-password" style="padding-right:40px;" />
            <span onclick="togglePwd('newPassword',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1rem;user-select:none;">👁️</span>
          </div>
        </div>
        <div class="form-group">
          <label>Confirm New Password</label>
          <div style="position:relative;">
            <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password" style="padding-right:40px;" />
            <span onclick="togglePwd('confirmPassword',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:1rem;user-select:none;">👁️</span>
          </div>
        </div>
        <button class="btn" id="resetBtn" onclick="handleReset()">Set New Password</button>
      </div>

      <a href="index.html" class="back-link">← Back to main site</a>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);

    function togglePwd(id, el) {
      const inp = document.getElementById(id);
      inp.type = inp.type === 'password' ? 'text' : 'password';
      el.textContent = inp.type === 'password' ? '👁️' : '🙈';
    }
    const token  = params.get('token');
    const type   = params.get('type'); // 'donor' or 'ngo'

    if (!token || !type) {
      document.getElementById('bannerError').textContent = '⚠️ Invalid or missing reset link. Please request a new one.';
      document.getElementById('bannerError').classList.add('show');
      document.getElementById('formWrap').style.display = 'none';
    }

    if (type === 'ngo') document.getElementById('pageTitle').textContent = 'Reset NGO Password';
    if (type === 'volunteer') document.getElementById('pageTitle').textContent = 'Reset Volunteer Password';

    async function handleReset() {
      const password = document.getElementById('newPassword').value;
      const confirm  = document.getElementById('confirmPassword').value;
      const errEl    = document.getElementById('bannerError');
      const sucEl    = document.getElementById('bannerSuccess');
      errEl.classList.remove('show'); sucEl.classList.remove('show');

      if (!password || password.length < 8) { errEl.textContent = '⚠️ Password must be at least 8 characters.'; errEl.classList.add('show'); return; }
      if (password !== confirm) { errEl.textContent = '⚠️ Passwords do not match.'; errEl.classList.add('show'); return; }

      const btn = document.getElementById('resetBtn');
      btn.disabled = true; btn.textContent = 'Resetting…';

      const endpoint = type === 'ngo' ? '/api/ngo/reset-password' : type === 'volunteer' ? '/api/volunteer/reset-password' : '/api/donor/reset-password';
      try {
        const res  = await fetch(`${API}${endpoint}`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({token, password}) });
        const data = await res.json();
        if (data.success) {
          sucEl.textContent = '✅ ' + data.message;
          sucEl.classList.add('show');
          document.getElementById('formWrap').style.display = 'none';
          setTimeout(() => { window.location.href = type === 'ngo' ? 'ngo-login.html' : type === 'volunteer' ? 'volunteer-login.html' : 'donor-login.html'; }, 2500);
        } else {
          errEl.textContent = '⚠️ ' + (data.error || 'Reset failed.');
          errEl.classList.add('show');
        }
      } catch { errEl.textContent = '⚠️ Could not connect to server.'; errEl.classList.add('show'); }
      finally { btn.disabled = false; btn.textContent = 'Set New Password'; }
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleReset(); });
  </script>
</body>
</html>
