<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — Terra Nova</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet" />
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{--forest:#1a3a2e;--forest-mid:#2d6a4f;--forest-lt:#52b788;--gold:#d4a853;--ivory:#f5f0e8;--ivory-dk:#ede6d8;--muted:#5a7365;--white:#fff;--red:#c0392b;--radius:10px}
    body{font-family:'DM Sans',sans-serif;background:var(--forest);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
    .box{background:var(--white);border-radius:16px;width:100%;max-width:400px;overflow:hidden;box-shadow:0 24px 64px rgba(0,0,0,0.3)}
    .box-header{background:linear-gradient(135deg,#0d2a1e,var(--forest));padding:32px;text-align:center}
    .box-header svg{width:32px;height:40px;color:var(--forest-lt);margin-bottom:12px}
    .box-header h1{font-family:'Playfair Display',serif;font-size:1.4rem;color:var(--ivory);margin-bottom:4px}
    .box-header p{font-size:0.78rem;color:rgba(245,240,232,0.5)}
    .box-body{padding:28px}
    .form-group{margin-bottom:14px}
    label{display:block;font-size:0.76rem;font-weight:600;color:var(--forest);margin-bottom:5px}
    input{width:100%;padding:10px 13px;font-size:0.88rem;font-family:'DM Sans',sans-serif;color:var(--forest);background:var(--ivory);border:1.5px solid var(--ivory-dk);border-radius:var(--radius);outline:none;transition:border-color .2s}
    input:focus{border-color:var(--forest-mid);background:var(--white)}
    .btn{width:100%;padding:12px;background:var(--forest);color:var(--ivory);font-size:0.9rem;font-weight:600;font-family:'DM Sans',sans-serif;border:none;border-radius:var(--radius);cursor:pointer;margin-top:6px;transition:background .2s}
    .btn:hover{background:var(--forest-mid)}
    .btn:disabled{opacity:.6;cursor:not-allowed}
    .banner{border-radius:var(--radius);padding:10px 14px;font-size:0.82rem;margin-bottom:14px;display:none}
    .banner.show{display:block}
    .banner.error{background:rgba(192,57,43,.08);border:1px solid rgba(192,57,43,.2);color:var(--red)}
  </style>
</head>
<body>
  <div class="box">
    <div class="box-header">
      <svg viewBox="0 0 32 42" fill="none"><path d="M16 40 C16 40 2 30 2 16 C2 8 8 2 16 2 C24 2 30 8 30 16 C30 30 16 40 16 40Z" fill="currentColor"/><line x1="16" y1="40" x2="16" y2="10" stroke="#1a3a2e" stroke-width="1.2"/></svg>
      <h1>Admin Portal</h1>
      <p>Terra Nova — Restricted Access</p>
    </div>
    <div class="box-body">
      <div class="banner error" id="bannerError"></div>
      <div class="form-group">
        <label>Username</label>
        <input type="text" id="username" placeholder="admin" autocomplete="username" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn" id="loginBtn" onclick="handleLogin()">Sign In</button>
    </div>
  </div>
  <script src="config.js"></script>
  <script>
    // Always require fresh login — clear any existing token
    localStorage.removeItem('admin_token');
    async function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const err = document.getElementById('bannerError');
      err.classList.remove('show');
      if (!username || !password) { err.textContent = '⚠️ Enter username and password.'; err.classList.add('show'); return; }
      const btn = document.getElementById('loginBtn');
      btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const res  = await fetch(`${API}/api/admin/login`, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({username,password}) });
        const data = await res.json();
        if (data.success) { localStorage.setItem('admin_token', data.token); window.location.href = 'admin-dashboard.html'; }
        else { err.textContent = '⚠️ ' + (data.error||'Login failed.'); err.classList.add('show'); }
      } catch { err.textContent = '⚠️ Could not connect to server.'; err.classList.add('show'); }
      finally { btn.disabled = false; btn.textContent = 'Sign In'; }
    }
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });
  </script>
</body>
</html>
